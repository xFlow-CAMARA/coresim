name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    runs-on: [self-hosted, camara-vm]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Format check
        working-directory: core-simulator
        run: |
          set -euo pipefail
          unformatted=$(find . -name '*.go' -type f -print0 | xargs -0 -r gofmt -l)
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Unit tests
        working-directory: core-simulator
        run: go test ./...

  docker-build:
    runs-on: [self-hosted, camara-vm]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image (core-simulator)
        run: |
          docker build \
            --build-arg GIT_BRANCH="${{ github.ref_name }}" \
            --build-arg GIT_COMMIT="${{ github.sha }}" \
            -f core-simulator/Dockerfile \
            core-simulator
